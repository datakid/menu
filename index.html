<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LX Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --clay: #E0794F;
  --clay-2: #C96442;
  --sage: #9CAB90;
  --r-xl: 40px;
  --r-lg: 30px;
  --ease: cubic-bezier(.22,.9,.24,1);
}

html[data-theme="dark"]{
  --bg: #141210;
  --ink: #F2EEE6;
  --ink-70: rgba(242,238,230,.72);
  --ink-45: rgba(242,238,230,.45);
  --ink-15: rgba(242,238,230,.12);
  --surface: rgba(255,255,255,.035);
  --surface-strong: rgba(255,255,255,.06);
  --border: rgba(255,255,255,.08);
  --border-hover: rgba(255,255,255,.16);
  --white-glow: rgba(255,255,255,.05);
  --dark-glow: rgba(0,0,0,.55);
  --inset-l: rgba(255,255,255,.05);
  --inset-d: rgba(0,0,0,.4);
  --bloom-1: rgba(224,121,79,.10);
  --bloom-2: rgba(156,171,144,.08);
}

html[data-theme="light"]{
  --bg: #F4F1EA;
  --ink: #1F1B16;
  --ink-70: rgba(31,27,22,.68);
  --ink-45: rgba(31,27,22,.42);
  --ink-15: rgba(31,27,22,.10);
  --surface: rgba(255,255,255,.5);
  --surface-strong: rgba(255,255,255,.7);
  --border: rgba(255,255,255,.55);
  --border-hover: rgba(255,255,255,.85);
  --white-glow: rgba(255,255,255,.8);
  --dark-glow: rgba(31,27,22,.13);
  --inset-l: rgba(255,255,255,.7);
  --inset-d: rgba(31,27,22,.11);
  --bloom-1: rgba(201,100,66,.08);
  --bloom-2: rgba(124,138,114,.09);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background: var(--bg);
  color: var(--ink);
  overflow:hidden;
  transition: background .4s var(--ease), color .4s var(--ease);
}

body::before{
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 1100px 700px at 10% -10%, var(--bloom-1), transparent 62%),
    radial-gradient(ellipse 900px 750px at 105% 60%, var(--bloom-2), transparent 60%);
  transition: background .4s var(--ease);
}
.glow{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background: radial-gradient(560px circle at var(--gx,50%) var(--gy,30%), var(--bloom-1), transparent 65%);
  transition: background .15s linear;
}

.shell{
  position:relative; z-index:1;
  width:100vw; height:100vh;
  padding: clamp(1.4rem,3.2vw,3rem);
  display:flex; flex-direction:column; gap:clamp(1.2rem,2.4vw,2rem);
}

.hdr{
  display:flex; align-items:center; justify-content:space-between;
  opacity:0; transform:translateY(-8px);
  flex-shrink:0;
}
.brand{ display:flex; align-items:center; gap:.7rem; }
.mark svg{ width:28px; height:28px; }
.wordmark{
  font-family:'Fraunces', serif; font-weight:600; font-size:1.25rem; letter-spacing:.01em;
}
.hdr-sub{
  font-family:'JetBrains Mono', monospace; font-size:.68rem; letter-spacing:.08em;
  color: var(--ink-45);
}
.hdr-right{ display:flex; align-items:center; gap:1.1rem; }

.theme-switch{
  display:flex; align-items:center; gap:2px;
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(16px);
  border-radius: 99px;
  padding: 3px;
  box-shadow: inset 1.5px 1.5px 4px var(--inset-d), inset -1.5px -1.5px 4px var(--inset-l);
}
.theme-opt{
  border:none; background:transparent; cursor:pointer;
  width:30px; height:26px; border-radius:99px;
  display:flex; align-items:center; justify-content:center;
  color: var(--ink-45);
  transition: background .28s var(--ease), color .28s var(--ease), box-shadow .28s var(--ease);
}
.theme-opt svg{ width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.theme-opt.active{
  background: linear-gradient(150deg, var(--clay), var(--clay-2));
  color:#fff;
  box-shadow: 0 2px 6px rgba(201,100,66,.35);
}

.bento{
  flex:1; min-height:0;
  display:grid;
  grid-template-columns: 1.5fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: clamp(.9rem,1.6vw,1.4rem);
}

.card{
  background: var(--surface);
  backdrop-filter: blur(24px) saturate(1.1);
  -webkit-backdrop-filter: blur(24px) saturate(1.1);
  border: 1px solid var(--border);
  box-shadow:
    -7px -7px 18px var(--white-glow),
    11px 11px 28px var(--dark-glow),
    inset 0 1px 0 var(--inset-l);
  position:relative; overflow:hidden;
  opacity:0; transform: translateY(16px) scale(.98);
  cursor:pointer;
  text-decoration:none; color:inherit;
  display:flex; flex-direction:column; justify-content:space-between;
  transition: transform .32s var(--ease), box-shadow .32s var(--ease), border-color .32s var(--ease), background .4s var(--ease);
}
.card:hover{ transform: translateY(-4px); border-color: var(--border-hover); }
.card:active{ transform: translateY(-1px) scale(.986); }
.card:focus-visible{
  outline:none;
  box-shadow:
    -7px -7px 18px var(--white-glow),
    11px 11px 28px var(--dark-glow),
    0 0 0 3px rgba(224,121,79,.4);
}

.ghost-num{
  position:absolute; right:.4rem; bottom:-.4rem;
  font-family:'Fraunces', serif; font-weight:300; font-style:italic;
  font-size:clamp(6rem,11vw,10rem); line-height:1;
  color: var(--ink); opacity:.05; pointer-events:none; user-select:none;
}

.card-top{ display:flex; align-items:flex-start; justify-content:space-between; padding: clamp(1.4rem,2vw,2.2rem) clamp(1.4rem,2vw,2.2rem) 0; position:relative; z-index:1; }
.card-num{ font-family:'JetBrains Mono', monospace; font-size:.72rem; color: var(--ink-45); letter-spacing:.05em; }
.card-ico{
  width:46px; height:46px; border-radius:15px;
  display:flex; align-items:center; justify-content:center;
  background: var(--surface-strong);
  box-shadow: inset 1.5px 1.5px 4px var(--inset-d), inset -1.5px -1.5px 4px var(--inset-l);
}
.card-ico svg{ width:19px; height:19px; stroke:var(--clay); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }

.card-body{ padding: 0 clamp(1.4rem,2vw,2.2rem); position:relative; z-index:1; }
.card-title{ font-family:'Fraunces', serif; font-weight:500; letter-spacing:-.015em; }
.card-sub{ color: var(--ink-45); margin-top:.5rem; line-height:1.55; max-width:34ch; }

.card-foot{
  display:flex; align-items:center; justify-content:space-between;
  padding: 1.4rem clamp(1.4rem,2vw,2.2rem) clamp(1.4rem,2vw,2.2rem);
  position:relative; z-index:1;
}
.card-arrow{
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background: var(--surface-strong);
  box-shadow: inset 1.5px 1.5px 4px var(--inset-d), inset -1.5px -1.5px 4px var(--inset-l);
  transition: transform .28s var(--ease), background .28s var(--ease);
}
.card:hover .card-arrow{ transform: translateX(4px); background: rgba(224,121,79,.16); }
.card-arrow svg{ width:15px; height:15px; stroke:var(--ink-70); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.card:hover .card-arrow svg{ stroke: var(--clay); }

.c-new{ grid-column: 1 / 2; grid-row: 1 / 3; border-radius: var(--r-xl); }
.c-new .card-title{ font-size: clamp(2.2rem,3.6vw,3.6rem); margin-top:0; }
.c-new .card-sub{ font-size: clamp(.9rem,1vw,1.05rem); max-width:32ch; }

.c-load{ grid-column: 2 / 3; grid-row: 1 / 2; border-radius: var(--r-lg); }
.c-load .card-title{ font-size: clamp(1.4rem,1.9vw,1.9rem); }
.c-load .card-sub{ font-size:.85rem; }

.c-exit{ grid-column: 2 / 3; grid-row: 2 / 3; border-radius: var(--r-lg); border-color: rgba(224,121,79,.16); }
.c-exit .card-top{ padding-bottom:0; }
.c-exit .card-ico{ background: rgba(224,121,79,.1); }
.c-exit .card-title{ font-size: clamp(1.2rem,1.6vw,1.5rem); }
.c-exit .card-sub{ font-size:.82rem; }

.ftr{
  display:flex; align-items:center; justify-content:center; gap:.55rem;
  font-family:'JetBrains Mono', monospace; font-size:.64rem; color: var(--ink-45);
  letter-spacing:.06em; opacity:0; flex-shrink:0;
}
.ftr .sep{ width:3px; height:3px; border-radius:50%; background: var(--ink-15); }

@media (max-width: 860px){
  body{ overflow-y:auto; }
  .shell{ height:auto; min-height:100vh; }
  .bento{ grid-template-columns: 1fr; grid-template-rows: none; }
  .c-new, .c-load, .c-exit{ grid-column: 1 / 2; grid-row: auto; min-height:220px; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
}

.fade-out{ opacity:0 !important; transition: opacity .5s var(--ease); }
</style>
</head>
<body>

<div class="glow" id="glow"></div>

<div class="shell">

  <header class="hdr" id="hdr">
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 26 26" fill="none">
          <path d="M13 2 L16 10 L24 13 L16 16 L13 24 L10 16 L2 13 L10 10 Z" fill="#E0794F"/>
        </svg>
      </div>
      <span class="wordmark">LX Menu</span>
    </div>
    <div class="hdr-right">
      <span class="hdr-sub">3 DESTINATIONS</span>
      <div class="theme-switch" id="themeSwitch">
        <button class="theme-opt" data-theme-opt="system" aria-label="System theme" title="System">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </button>
        <button class="theme-opt" data-theme-opt="light" aria-label="Light theme" title="Light">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        </button>
        <button class="theme-opt" data-theme-opt="dark" aria-label="Dark theme" title="Dark">
          <svg viewBox="0 0 24 24"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="bento" id="bento">

    <a class="card c-new" id="newForm" href="https://finalapp-nine.vercel.app/" target="_blank" rel="noopener">
      <span class="ghost-num">01</span>
      <div class="card-top">
        <span class="card-num">01 / NEW</span>
        <div class="card-ico"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-title">New Form</div>
        <div class="card-sub">Start a fresh submission from a blank slate — clean state, no leftover fields.</div>
      </div>
      <div class="card-foot">
        <span class="card-sub" style="margin:0">Opens in a new tab</span>
        <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </div>
    </a>

    <a class="card c-load" id="loadForm" href="https://dashboard2-iota.vercel.app/" target="_blank" rel="noopener">
      <span class="ghost-num">02</span>
      <div class="card-top">
        <span class="card-num">02 / LOAD</span>
        <div class="card-ico"><svg viewBox="0 0 24 24"><path d="M4 4h16v5H4zM4 12h16v8H4z"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-title">Load Form</div>
        <div class="card-sub">Pick up a submission already in progress.</div>
      </div>
      <div class="card-foot">
        <span class="card-sub" style="margin:0">Opens in a new tab</span>
        <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </div>
    </a>

    <button class="card c-exit" id="exitBtn" type="button">
      <span class="ghost-num">03</span>
      <div class="card-top">
        <span class="card-num">03 / EXIT</span>
        <div class="card-ico"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
      </div>
      <div class="card-body">
        <div class="card-title">Exit</div>
        <div class="card-sub">Close this window.</div>
      </div>
      <div class="card-foot">
        <span></span>
        <div class="card-arrow"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </div>
    </button>

  </div>

  <div class="ftr" id="ftr">
    <span>LX MENU</span><span class="sep"></span><span>v1.5</span>
  </div>

</div>

<script>
(function(){
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const root = document.documentElement;
  const mq = matchMedia('(prefers-color-scheme: dark)');
  let mode = 'system';

  function applyTheme(){
    const resolved = mode === 'system' ? (mq.matches ? 'dark' : 'light') : mode;
    root.setAttribute('data-theme', resolved);
    document.querySelectorAll('.theme-opt').forEach(b=>{
      b.classList.toggle('active', b.dataset.themeOpt === mode);
    });
  }

  mq.addEventListener('change', ()=>{ if(mode === 'system') applyTheme(); });

  document.querySelectorAll('.theme-opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      mode = btn.dataset.themeOpt;
      applyTheme();
    });
  });

  applyTheme();

  function reveal(){
    const hdr = document.getElementById('hdr');
    const cards = document.querySelectorAll('.card');
    const ftr = document.getElementById('ftr');

    if(reduced){
      hdr.style.opacity = 1;
      ftr.style.opacity = 1;
      cards.forEach(c=>{ c.style.opacity=1; c.style.transform='none'; });
      return;
    }

    hdr.style.transition = 'opacity .6s cubic-bezier(.22,.9,.24,1), transform .6s cubic-bezier(.22,.9,.24,1)';
    requestAnimationFrame(()=>{
      hdr.style.opacity = 1;
      hdr.style.transform = 'translateY(0)';
    });

    cards.forEach((c,i)=>{
      c.style.transition = `opacity .6s cubic-bezier(.22,.9,.24,1) ${.12 + i*.09}s, transform .6s cubic-bezier(.22,.9,.24,1) ${.12 + i*.09}s`;
      requestAnimationFrame(()=>{
        c.style.opacity = 1;
        c.style.transform = 'translateY(0) scale(1)';
      });
    });

    setTimeout(()=>{
      ftr.style.transition = 'opacity .6s ease';
      ftr.style.opacity = 1;
    }, 560);
  }

  reveal();

  if(!reduced){
    const glow = document.getElementById('glow');
    window.addEventListener('mousemove', e=>{
      glow.style.setProperty('--gx', e.clientX + 'px');
      glow.style.setProperty('--gy', e.clientY + 'px');
    }, {passive:true});
  }

  document.getElementById('exitBtn').addEventListener('click', ()=>{
    const shell = document.querySelector('.shell');
    shell.classList.add('fade-out');
    setTimeout(()=>{
      try{ window.close(); }catch(_){}
    }, 480);
  });
})();
</script>
</body>
</html>
