<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LX Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pure: #000000;
            --blood-deep: #4A0000;
            --blood-bright: #990000;
            --ember: #ff3300;
            --text-dim: #555555;
            --text-hover: #EBEBEB;
            --text-active: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-pure);
            font-family: 'Cinzel', serif;
            color: var(--text-dim);
            overflow: hidden;
            cursor: default;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .background-layer {
            position: fixed;
            inset: -5%;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle at 75% 50%, var(--blood-deep) 0%, var(--bg-pure) 55%);
            opacity: 0.4;
            z-index: 0;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .omega-shadow {
            position: fixed;
            right: -10vw;
            top: 50%;
            transform: translateY(-50%);
            font-size: 140vh;
            color: var(--bg-pure);
            text-shadow: 0 0 100px rgba(153, 0, 0, 0.15);
            z-index: 1;
            pointer-events: none;
            opacity: 0.8;
            user-select: none;
        }

        .cinematic-vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.8) 75%, var(--bg-pure) 100%);
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 15;
        }

        .particles-container {
            position: fixed;
            inset: -10%;
            width: 120%;
            height: 120%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--ember);
            will-change: transform, opacity;
            box-shadow: 0 0 8px var(--ember), 0 0 15px var(--blood-bright);
        }

        .ash {
            background: #2a2a2a;
            box-shadow: none;
        }

        .ui-container {
            position: absolute;
            left: 12%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .title-wrapper {
            position: relative;
            opacity: 0;
            transform: translateY(20px);
        }

        .main-title {
            font-size: clamp(2rem, 5vw, 4.5rem);
            font-weight: 400;
            color: var(--text-hover);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .title-separator {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--blood-bright), transparent);
            margin-top: 1rem;
            box-shadow: 0 0 10px var(--blood-bright);
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            list-style: none;
            opacity: 0;
        }

        .menu-item {
            position: relative;
            width: fit-content;
        }

        .menu-link {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 500;
            color: var(--text-dim);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            padding: 0.5rem 0;
            cursor: pointer;
            background: transparent;
            border: none;
            outline: none;
            transition: color 0.4s cubic-bezier(0.25, 1, 0.5, 1), text-shadow 0.4s ease;
        }

        .menu-link::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 4px;
            background-color: var(--blood-bright);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease, left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 10px var(--blood-bright);
        }

        .blade-slash {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 1px;
            background: linear-gradient(90deg, var(--blood-bright), var(--ember), transparent);
            box-shadow: 0 0 8px var(--ember);
            transition: width 0.5s cubic-bezier(0.21, 0.83, 0.26, 1);
            pointer-events: none;
        }

        .menu-link:hover, .menu-link:focus {
            color: var(--text-active);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .menu-link:hover::before {
            opacity: 1;
            left: -15px;
        }

        .menu-link:hover .blade-slash {
            width: 100%;
        }

        .prompt-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: var(--bg-pure);
            transition: opacity 1s ease;
        }

        .prompt-text {
            font-size: 1.1rem;
            letter-spacing: 0.5em;
            color: var(--text-dim);
            text-transform: uppercase;
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255, 255, 255, 0.1); }
        }

        .screen-flash {
            position: fixed;
            inset: 0;
            background: var(--blood-bright);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        @media screen and (max-width: 768px) {
            .ui-container {
                left: 50%;
                transform: translate(-50%, -50%);
                align-items: center;
            }
            .title-separator {
                background: radial-gradient(circle, var(--blood-bright), transparent 80%);
            }
            .menu-list {
                align-items: center;
            }
            .menu-link::before {
                display: none;
            }
            .blade-slash {
                background: linear-gradient(90deg, transparent, var(--blood-bright), transparent);
                left: 50%;
                transform: translateX(-50%);
            }
            .menu-link:hover .blade-slash {
                width: 80%;
            }
            .omega-shadow {
                right: 50%;
                transform: translate(50%, -50%);
                font-size: 80vh;
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="omega-shadow">Ω</div>
    <div class="particles-container"></div>
    <div class="cinematic-vignette"></div>
    <div class="screen-flash"></div>

    <div class="prompt-container">
        <div class="prompt-text">Press Any Key</div>
    </div>

    <div class="ui-container">
        <div class="title-wrapper">
            <h1 class="main-title">LX Menu</h1>
            <div class="title-separator"></div>
        </div>

        <ul class="menu-list">
            <li class="menu-item">
                <a class="menu-link" href="https://finalapp-nine.vercel.app/" target="_blank">
                    New Form
                    <div class="blade-slash"></div>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" href="https://dashboard2-iota.vercel.app/" target="_blank">
                    Load Form
                    <div class="blade-slash"></div>
                </a>
            </li>
            <li class="menu-item">
                <button class="menu-link action-exit">
                    Exit
                    <div class="blade-slash"></div>
                </button>
            </li>
        </ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.config({ force3D: true });

            const bgLayer = document.querySelector('.background-layer');
            const omega = document.querySelector('.omega-shadow');
            const particlesContainer = document.querySelector('.particles-container');
            const promptContainer = document.querySelector('.prompt-container');
            
            let isStarted = false;
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;

            // Particle System (Optimized & Mature)
            const createParticles = () => {
                const particleCount = 45; // Low count for sleekness
                
                for (let i = 0; i < particleCount; i++) {
                    const isAsh = Math.random() > 0.3;
                    const p = document.createElement('div');
                    p.classList.add('particle');
                    if (isAsh) p.classList.add('ash');
                    
                    particlesContainer.appendChild(p);

                    const size = isAsh ? gsap.utils.random(2, 6) : gsap.utils.random(1, 3);
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    
                    if (isAsh) {
                        p.style.filter = `blur(${gsap.utils.random(1, 3)}px)`;
                        p.style.opacity = gsap.utils.random(0.1, 0.4);
                    } else {
                        p.style.opacity = gsap.utils.random(0.4, 0.8);
                    }

                    animateParticle(p, true);
                }
            };

            const animateParticle = (p, isInitial = false) => {
                const startY = isInitial ? gsap.utils.random(0, window.innerHeight) : window.innerHeight + 50;
                const endY = -50;
                const startX = gsap.utils.random(-100, window.innerWidth + 100);
                const driftX = gsap.utils.random(-150, 150); // Gentle horizontal drift
                const duration = gsap.utils.random(12, 25); // Slow, floating feeling

                gsap.fromTo(p, 
                    { 
                        y: startY, 
                        x: startX,
                        rotation: gsap.utils.random(0, 360)
                    },
                    { 
                        y: endY, 
                        x: startX + driftX, 
                        rotation: `+=${gsap.utils.random(-90, 90)}`,
                        duration: duration,
                        ease: "none",
                        onComplete: () => animateParticle(p)
                    }
                );
            };

            createParticles();

            // Subtle Parallax (No aggressive shaking)
            window.addEventListener('mousemove', (e) => {
                if (!isStarted) return;
                
                // Smooth interpolation for mouse position
                const targetX = (e.clientX / window.innerWidth - 0.5) * 20;
                const targetY = (e.clientY / window.innerHeight - 0.5) * 20;

                gsap.to(bgLayer, {
                    x: targetX,
                    y: targetY,
                    duration: 2,
                    ease: "power2.out"
                });

                gsap.to(omega, {
                    x: -targetX * 2,
                    y: -targetY * 2,
                    duration: 3,
                    ease: "power2.out"
                });
            }, { passive: true });

            // Interactive elements
            const menuLinks = document.querySelectorAll('.menu-link');
            
            menuLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const isExit = link.classList.contains('action-exit');
                    
                    // Subtle click reaction
                    gsap.to(link, {
                        scale: 0.98,
                        duration: 0.1,
                        yoyo: true,
                        repeat: 1
                    });

                    // Quick cinematic red flash on click
                    gsap.fromTo('.screen-flash', 
                        { opacity: 0.15 }, 
                        { opacity: 0, duration: 0.6, ease: "power2.out" }
                    );

                    if (isExit) {
                        e.preventDefault();
                        // Cinematic fade out sequence
                        const tl = gsap.timeline();
                        tl.to('.ui-container', { x: -50, opacity: 0, duration: 0.8, ease: "power2.in" }, 0)
                          .to('.background-layer, .omega-shadow, .particles-container', { opacity: 0, duration: 1.5, ease: "power2.inOut" }, 0.2)
                          .to(document.body, { backgroundColor: '#000', duration: 1 }, 0.5)
                          .add(() => {
                              window.open('','_self',''); 
                              window.close();
                          });
                    }
                });
            });

            // Start Sequence
            const igniteMenu = () => {
                if (isStarted) return;
                isStarted = true;

                // Remove event listeners
                window.removeEventListener('keydown', igniteMenu);
                window.removeEventListener('click', igniteMenu);
                window.removeEventListener('touchstart', igniteMenu);

                const tl = gsap.timeline();

                // Fade out prompt
                tl.to(promptContainer, {
                    opacity: 0,
                    duration: 0.8,
                    ease: "power2.inOut",
                    onComplete: () => promptContainer.remove()
                }, 0);

                // Flash effect for impact
                tl.fromTo('.screen-flash', 
                    { opacity: 0.3 }, 
                    { opacity: 0, duration: 1.5, ease: "power3.out" }, 
                0.5);

                // Reveal Title
                tl.to('.title-wrapper', {
                    opacity: 1,
                    y: 0,
                    duration: 1.2,
                    ease: "power3.out"
                }, 0.8);

                tl.to('.title-separator', {
                    width: window.innerWidth > 768 ? '150px' : '80%',
                    duration: 1.5,
                    ease: "power4.out"
                }, 1.2);

                // Reveal Menu Items
                tl.to('.menu-list', {
                    opacity: 1,
                    duration: 0.5
                }, 1.4);

                tl.fromTo('.menu-item', 
                    { opacity: 0, x: -20 }, 
                    { 
                        opacity: 1, 
                        x: 0, 
                        duration: 0.8, 
                        stagger: 0.15, 
                        ease: "power2.out" 
                    }, 
                1.4);
            };

            window.addEventListener('keydown', igniteMenu);
            window.addEventListener('click', igniteMenu);
            window.addEventListener('touchstart', igniteMenu, { passive: true });
            
            // Prevent context menu
            window.addEventListener('contextmenu', e => e.preventDefault());
        });
    </script>
</body>
</html>
