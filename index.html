<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LX Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pure: #020101;
            --blood-deep: #2a0000;
            --blood-bright: #ad0000;
            --blood-glow: #ff1a1a;
            --ember: #ff5500;
            --gold-dark: #b8860b;
            --gold-light: #ffd700;
            --text-dim: #7a7a7a;
            --text-hover: #f0f0f0;
            --text-active: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-pure);
            font-family: 'Cinzel', serif;
            color: var(--text-dim);
            overflow: hidden;
            cursor: default;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .background-layer {
            position: fixed;
            inset: -5%;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle at 60% 40%, var(--blood-deep) 0%, var(--bg-pure) 60%);
            z-index: 0;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .ambient-mist {
            position: fixed;
            width: 200vw;
            height: 200vh;
            top: -50vh;
            left: -50vw;
            background: radial-gradient(circle at center, rgba(173, 0, 0, 0.05) 0%, transparent 60%);
            filter: blur(40px);
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }

        .mist-1 { animation: drift 40s infinite alternate ease-in-out; }
        .mist-2 { animation: drift 50s infinite alternate-reverse ease-in-out; transform: scale(1.2); }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(3vw, 3vh) scale(1.05); }
        }

        .omega-shadow {
            position: fixed;
            right: -18vw;
            top: 50%;
            transform: translateY(-50%);
            font-size: 180vh;
            font-weight: 800;
            background: linear-gradient(to bottom, #110000, var(--bg-pure));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(173, 0, 0, 0.2));
            z-index: 2;
            pointer-events: none;
            user-select: none;
        }

        .cinematic-vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(2, 1, 1, 0.85) 80%, #000000 100%);
            box-shadow: inset 0 0 250px rgba(0,0,0,0.95);
            pointer-events: none;
            z-index: 15;
        }

        .particles-container {
            position: fixed;
            inset: -10%;
            width: 120%;
            height: 120%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--ember);
            will-change: transform, opacity;
            box-shadow: 0 0 10px var(--ember), 0 0 20px var(--blood-bright);
        }

        .ash {
            background: #1a1a1a;
            box-shadow: 0 0 5px #000;
        }

        .ui-container {
            position: absolute;
            left: 10%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .title-wrapper {
            position: relative;
            opacity: 0;
        }

        .main-title {
            font-size: clamp(3rem, 7vw, 6.5rem);
            font-weight: 700;
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d4 40%, #737373 80%, #2e2e2e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            filter: drop-shadow(0 0 30px rgba(173, 0, 0, 0.8));
            position: relative;
            will-change: transform, opacity, filter, letter-spacing;
        }

        .main-title::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            z-index: -1;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--blood-bright) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.3;
            filter: blur(12px);
        }

        .title-separator {
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-light), var(--blood-bright), transparent);
            margin-top: 1.5rem;
            box-shadow: 0 0 15px var(--blood-glow), 0 0 5px var(--gold-light);
            opacity: 0.8;
        }

        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            list-style: none;
            opacity: 0;
        }

        .menu-item {
            position: relative;
            width: fit-content;
        }

        .menu-link {
            display: flex;
            align-items: center;
            font-family: 'Cinzel', serif;
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            font-weight: 500;
            color: var(--text-dim);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            padding: 0.5rem 0;
            cursor: pointer;
            background: transparent;
            border: none;
            outline: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .menu-link::before {
            content: '♦';
            position: absolute;
            left: -30px;
            font-size: 0.8em;
            color: var(--blood-bright);
            opacity: 0;
            transform: translateX(-10px) rotate(45deg);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 0 15px var(--blood-glow);
        }

        .blade-slash {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-light), var(--blood-glow), transparent);
            box-shadow: 0 0 12px var(--ember);
            transition: width 0.5s cubic-bezier(0.21, 0.83, 0.26, 1);
            pointer-events: none;
        }

        .menu-link:hover, .menu-link:focus {
            color: var(--text-active);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 0 40px rgba(173, 0, 0, 0.6);
            letter-spacing: 0.6em;
            transform: translateX(10px);
        }

        .menu-link:hover::before {
            opacity: 1;
            transform: translateX(0) rotate(0deg);
        }

        .menu-link:hover .blade-slash {
            width: 120%;
        }

        .prompt-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: var(--bg-pure);
            transition: opacity 0.8s ease;
        }

        .prompt-text {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.6em;
            color: var(--text-dim);
            text-transform: uppercase;
            animation: breathe 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; filter: blur(1px); }
            50% { opacity: 1; filter: blur(0px); text-shadow: 0 0 20px rgba(255, 255, 255, 0.2), 0 0 10px var(--blood-deep); }
        }

        .screen-flash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--blood-glow), var(--bg-pure));
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            mix-blend-mode: color-dodge;
        }

        @media screen and (max-width: 768px) {
            .ui-container {
                left: 50%;
                transform: translate(-50%, -50%);
                align-items: center;
                gap: 3rem;
            }
            .main-title {
                text-align: center;
            }
            .title-separator {
                background: radial-gradient(circle, var(--blood-bright), var(--ember), transparent 80%);
                height: 1px;
                left: 50%;
                transform: translateX(-50%);
                position: relative;
            }
            .menu-list {
                align-items: center;
            }
            .menu-link::before {
                display: none;
            }
            .blade-slash {
                background: linear-gradient(90deg, transparent, var(--blood-bright), transparent);
                left: 50%;
                transform: translateX(-50%);
            }
            .menu-link:hover {
                transform: translateY(-2px);
                letter-spacing: 0.6em;
            }
            .menu-link:hover .blade-slash {
                width: 100%;
            }
            .omega-shadow {
                right: -25vw;
                font-size: 100vh;
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>
    <div class="ambient-mist mist-1"></div>
    <div class="ambient-mist mist-2"></div>
    <div class="omega-shadow">Ω</div>
    <div class="particles-container"></div>
    <div class="cinematic-vignette"></div>
    <div class="screen-flash"></div>

    <div class="prompt-container">
        <div class="prompt-text">Press Any Key</div>
    </div>

    <div class="ui-container">
        <div class="title-wrapper">
            <h1 class="main-title" data-text="LX Menu">LX Menu</h1>
            <div class="title-separator"></div>
        </div>

        <ul class="menu-list">
            <li class="menu-item">
                <a class="menu-link" href="https://finalapp-nine.vercel.app/" target="_blank">
                    New Form
                    <div class="blade-slash"></div>
                </a>
            </li>
            <li class="menu-item">
                <a class="menu-link" href="https://dashboard2-iota.vercel.app/" target="_blank">
                    Load Form
                    <div class="blade-slash"></div>
                </a>
            </li>
            <li class="menu-item">
                <button class="menu-link action-exit">
                    Exit
                    <div class="blade-slash"></div>
                </button>
            </li>
        </ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.config({ force3D: true });

            const bgLayer = document.querySelector('.background-layer');
            const omega = document.querySelector('.omega-shadow');
            const particlesContainer = document.querySelector('.particles-container');
            const promptContainer = document.querySelector('.prompt-container');
            
            let isStarted = false;

            const createParticles = () => {
                const particleCount = 50;
                
                for (let i = 0; i < particleCount; i++) {
                    const isAsh = Math.random() > 0.4;
                    const p = document.createElement('div');
                    p.classList.add('particle');
                    if (isAsh) p.classList.add('ash');
                    
                    particlesContainer.appendChild(p);

                    const size = isAsh ? gsap.utils.random(2, 6) : gsap.utils.random(1, 3);
                    p.style.width = `${size}px`;
                    p.style.height = `${size}px`;
                    
                    if (isAsh) {
                        p.style.filter = `blur(${gsap.utils.random(1, 3)}px)`;
                        p.style.opacity = gsap.utils.random(0.1, 0.4);
                    } else {
                        p.style.opacity = gsap.utils.random(0.4, 0.8);
                    }

                    animateParticle(p, true);
                }
            };

            const animateParticle = (p, isInitial = false) => {
                const startY = isInitial ? gsap.utils.random(0, window.innerHeight) : window.innerHeight + 50;
                const endY = -50;
                const startX = gsap.utils.random(-100, window.innerWidth + 100);
                const driftX = gsap.utils.random(-150, 150);
                const duration = gsap.utils.random(12, 28);

                gsap.fromTo(p, 
                    { 
                        y: startY, 
                        x: startX,
                        rotation: gsap.utils.random(0, 360)
                    },
                    { 
                        y: endY, 
                        x: startX + driftX, 
                        rotation: `+=${gsap.utils.random(-180, 180)}`,
                        duration: duration,
                        ease: "none",
                        onComplete: () => animateParticle(p)
                    }
                );
            };

            createParticles();

            window.addEventListener('mousemove', (e) => {
                if (!isStarted) return;
                
                const targetX = (e.clientX / window.innerWidth - 0.5) * 20;
                const targetY = (e.clientY / window.innerHeight - 0.5) * 20;

                gsap.to(bgLayer, {
                    x: targetX,
                    y: targetY,
                    duration: 2,
                    ease: "power2.out"
                });

                gsap.to(omega, {
                    x: -targetX * 0.4,
                    y: -targetY * 0.4,
                    duration: 2.5,
                    ease: "power2.out"
                });
            }, { passive: true });

            const menuLinks = document.querySelectorAll('.menu-link');
            
            menuLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const isExit = link.classList.contains('action-exit');
                    
                    gsap.to(link, {
                        scale: 0.95,
                        duration: 0.1,
                        yoyo: true,
                        repeat: 1
                    });

                    gsap.fromTo('.screen-flash', 
                        { opacity: 0.2 }, 
                        { opacity: 0, duration: 0.6, ease: "power2.out" }
                    );

                    if (isExit) {
                        e.preventDefault();
                        const tl = gsap.timeline();
                        tl.to('.ui-container', { x: -100, opacity: 0, filter: "blur(10px)", duration: 0.8, ease: "power3.in" }, 0)
                          .to('.background-layer, .ambient-mist, .omega-shadow, .particles-container', { opacity: 0, scale: 1.05, duration: 1.2, ease: "power2.inOut" }, 0.2)
                          .to(document.body, { backgroundColor: '#000', duration: 0.8 }, 0.5)
                          .add(() => {
                              window.open('','_self',''); 
                              window.close();
                          });
                    }
                });
            });

            const igniteMenu = () => {
                if (isStarted) return;
                isStarted = true;

                window.removeEventListener('keydown', igniteMenu);
                window.removeEventListener('click', igniteMenu);
                window.removeEventListener('touchstart', igniteMenu);

                const tl = gsap.timeline();

                tl.to(promptContainer, {
                    opacity: 0,
                    filter: "blur(10px)",
                    scale: 1.1,
                    duration: 0.5,
                    ease: "power2.inOut",
                    onComplete: () => promptContainer.remove()
                }, 0);

                tl.fromTo('.screen-flash', 
                    { opacity: 0.4 }, 
                    { opacity: 0, duration: 1.2, ease: "power3.out" }, 
                0.2);

                tl.to('.title-wrapper', {
                    opacity: 1,
                    duration: 0.1
                }, 0.2);

                tl.fromTo('.main-title',
                    { 
                        opacity: 0, 
                        scale: 1.1, 
                        filter: "blur(10px)", 
                        letterSpacing: "0.1em" 
                    },
                    { 
                        opacity: 1, 
                        scale: 1, 
                        filter: "blur(0px)", 
                        letterSpacing: "0.2em", 
                        duration: 1.2, 
                        ease: "power3.out" 
                    }, 
                0.2);

                tl.to('.title-separator', {
                    width: window.innerWidth > 768 ? '180px' : '80%',
                    duration: 0.8,
                    ease: "power3.out"
                }, 0.8);

                tl.to('.menu-list', {
                    opacity: 1,
                    duration: 0.1
                }, 0.9);

                tl.fromTo('.menu-item', 
                    { opacity: 0, x: -30, filter: "blur(5px)" }, 
                    { 
                        opacity: 1, 
                        x: 0, 
                        filter: "blur(0px)",
                        duration: 0.8, 
                        stagger: 0.1, 
                        ease: "power3.out" 
                    }, 
                0.9);
            };

            window.addEventListener('keydown', igniteMenu);
            window.addEventListener('click', igniteMenu);
            window.addEventListener('touchstart', igniteMenu, { passive: true });
            
            window.addEventListener('contextmenu', e => e.preventDefault());
        });
    </script>
</body>
</html>
